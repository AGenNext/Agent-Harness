name: Deploy to Harbor (Podman)

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      harbor_url:
        description: 'Harbor URL'
        required: true
        default: 'harbor.autonomyx.io'
      harbor_username:
        description: 'Harbor Username'
        required: true
      harbor_password:
        description: 'Harbor Password'
        required: true

jobs:
  deploy-harbor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
          
      - name: Build image
        run: |
          podman build -t ${{ github.event.inputs.harbor_url || 'harbor.autonomyx.io' }}/agent-harness:latest .
          
      - name: Login to Harbor
        run: |
          echo ${{ github.event.inputs.harbor_password }} | podman login ${{ github.event.inputs.harbor_url || 'harbor.autonomyx.io' }} -u ${{ github.event.inputs.harbor_username }} --password-stdin
          
      - name: Push to Harbor
        run: |
          podman push ${{ github.event.inputs.harbor_url || 'harbor.autonomyx.io' }}/agent-harness:latest
