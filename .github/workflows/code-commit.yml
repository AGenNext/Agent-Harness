# Code Commit GitHub Action
# Automatically fixes issues using AI

name: Code Commit

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened]

jobs:
  fix-issue:
    if: >
      github.event_name == 'issue_comment' && 
      (contains(github.event.comment.body, '/fix') || contains(github.event.comment.body, '/commit')) ||
      github.event_name == 'issues' && 
      (contains(github.event.label.name, 'fix') || contains(github.event.label.name, 'auto-fix')) ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install openai anthropic github3.py

      - name: Get issue details
        id: issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get issue title and body
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            ISSUE_TITLE="${{ github.event.issue.title }}"
            ISSUE_BODY="${{ github.event.comment.body }}"
          fi
          
          echo "title=$ISSUE_TITLE" >> $GITHUB_OUTPUT
          echo "body=$ISSUE_BODY" >> $GITHUB_OUTPUT

      - name: Generate fix with AI
        id: ai-fix
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Use Anthropic Claude for better code generation
          python << 'EOF'
          import os
          import json
          
          title = """${{ steps.issue.outputs.title }}"""
          body = """${{ steps.issue.outputs.body }}"""
          
          prompt = f"""You are a senior developer. Fix this GitHub issue.

Issue Title: {title}
Issue Description: {body}

Your task:
1. Analyze the issue
2. Write the fix code
3. Test it works

Return JSON with:
{{
  "analysis": "What the issue is",
  "files": {{
    "/path/to/file.py": "完整的修复代码内容"
  }},
  "commit_message": "fix: resolve issue"
}}

Be precise - include full file contents.
"""
          
          # Try Anthropic first, then OpenAI
          if os.getenv("ANTHROPIC_API_KEY"):
            import anthropic
            client = anthropic.Anthropic(api_key=os.getenv("ANTHROPIC_API_KEY"))
            response = client.messages.create(
              model="claude-sonnet-4-20250514",
              max_tokens=4000,
              messages=[{"role": "user", "content": prompt}]
            )
            result = response.content[0].text
          elif os.getenv("OPENAI_API_KEY"):
            import openai
            openai.api_key = os.getenv("OPENAI_API_KEY")
            response = openai.ChatCompletion.create(
              model="gpt-4o",
              messages=[{"role": "user", "content": prompt}]
            )
            result = response.choices[0].message.content
          else:
            print("::error::No AI API key configured")
            exit(1)
          
          # Parse JSON from response
          import re
          match = re.search(r'\{.*\}', result, re.DOTALL)
          if match:
            fix_data = json.loads(match.group())
            print(f"fix_json={json.dumps(fix_data)}" >> $GITHUB_OUTPUT)
          EOF

      - name: Apply fix
        if: steps.ai-fix.outputs.fix_json
        env:
          FIX_JSON: ${{ steps.ai-fix.outputs.fix_json }}
        run: |
          # Parse the fix JSON and write files
          python << 'EOF'
          import json
          import os
          
          fix_data = json.loads(os.getenv("FIX_JSON"))
          
          for filepath, content in fix_data.get("files", {}).items():
            os.makedirs(os.path.dirname(filepath), exist_ok=True)
            with open(filepath, "w") as f:
              f.write(content)
            print(f"Created: {filepath}")
          
          print(f"commit_message={fix_data.get('commit_message', 'fix: resolve issue')}" >> $GITHUB_OUTPUT
          EOF

      - name: Create branch and commit
        if: steps.ai-fix.outputs.fix_json
        env:
          COMMIT_MESSAGE: ${{ steps.ai-fix.outputs.commit_message }}
        run: |
          BRANCH="fix/issue-${{ github.event.issue.number }}"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -b $BRANCH
          git add -A
          git commit -m "$COMMIT_MESSAGE"
          git push -u origin $BRANCH

      - name: Create PR
        if: steps.ai-fix.outputs.fix_json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Fix: ${{ github.event.issue.title }}" \
            --body "Fixes #${{ github.event.issue.number }}" \
            --base ${{ github.event.repository.default_branch }}

      - name: Comment on issue
        if: steps.ai-fix.outputs.fix_json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "## Fix Generated! 🎉
          
          I've created a PR with the fix. It will be merged once checks pass."